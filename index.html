<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天城娛樂城｜信用額度申請</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,"Microsoft JhengHei";
  background:linear-gradient(135deg,#0b1020,#121a33);
  color:#fff;
}

.container{
  max-width:720px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:#1b2440;
  border-radius:16px;
  padding:24px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

h1{text-align:center;margin-bottom:10px;}
.step{display:flex;margin-bottom:20px;}
.step div{
  flex:1;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:#2b3560;
}
.step .active{background:#6c63ff;}

input,select{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:14px;
  border-radius:8px;
  border:none;
  background:#0f1730;
  color:#fff;
}

select option{
  color:#000;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#6c63ff,#00c6ff);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.error{
  color:#ff6b6b;
  font-size:12px;
  display:none;
}

.success{
  text-align:center;
}
.big{
  font-size:40px;
  font-weight:bold;
  color:#00e5a8;
}
.line-btn{
  background:#00c300;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>天城娛樂城帳號申請</h1>

<div class="card">

<div class="step">
  <div id="s1" class="active">第1步 基本資料</div>
  <div id="s2">第2步 額度評估</div>
</div>

<!-- STEP 1 -->
<div id="step1">

姓名*
<input id="name">

手機號碼*
<input id="phone">
<div id="err-phone" class="error">手機格式錯誤（需09開頭10碼）</div>

LINE ID*
<input id="line">

現居地址*
<input id="address">

緊急聯絡人姓名*
<input id="emergencyName">

關係*
<input id="emergencyRelation">

緊急聯絡人電話*
<input id="emergencyPhone">

<button onclick="next()">下一步</button>

</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">

公司名稱*
<input id="companyName">

公司地址（非必填）
<input id="companyAddress">

公司電話*
<input id="companyPhone">

月薪*
<select id="salary">
<option value="">請選擇</option>
<option>A.3萬以下</option>
<option>B.3-5萬</option>
<option>C.5-8萬</option>
<option>D.8萬以上</option>
</select>

<button onclick="submitForm()">送出申請</button>

</div>

<!-- SUCCESS -->
<div id="done" style="display:none;" class="success">

<h2>申請已送出</h2>

<p>預估可申請額度</p>
<div id="credit" class="big"></div>

<p>審核狀態：待審核</p>

<button class="line-btn" onclick="goLine()">👉 聯繫版務LINE</button>

</div>

</div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://trhxabsjnzgfscxvsbiy.supabase.co",
  "sb_publishable_MKnBFZ4b2OkcDtLSTZO6Ow_0IG2LllT"
);

function isPhone(v){
  return /^09\d{8}$/.test(v);
}

function next(){
  const phone=document.getElementById("phone").value.trim();

  if(!isPhone(phone)){
    document.getElementById("err-phone").style.display="block";
    return;
  }

  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
  document.getElementById("s1").classList.remove("active");
  document.getElementById("s2").classList.add("active");
}

function getCredit(s){
  const map={
    "A.3萬以下":"4,500",
    "B.3-5萬":"5,000",
    "C.5-8萬":"5,500",
    "D.8萬以上":"6,000"
  };
  return map[s]||"-";
}

async function submitForm(){

  const data={
    name:val("name"),
    phone:val("phone"),
    line:val("line"),
    address:val("address"),
    emergency_name:val("emergencyName"),
    emergency_relation:val("emergencyRelation"),
    emergency_phone:val("emergencyPhone"),
    company_name:val("companyName"),
    company_address:val("companyAddress"),
    company_phone:val("companyPhone"),
    salary:val("salary")
  };

  const {error}=await supabase.from("credit_applications").insert([data]);

  if(error){
    alert("送出失敗");
    return;
  }

  document.getElementById("step2").style.display="none";
  document.getElementById("done").style.display="block";

  document.getElementById("credit").innerText=getCredit(data.salary);
}

function val(id){
  return document.getElementById(id).value.trim();
}

function goLine(){
  window.location.href="https://line.me/ti/p/rVBnRpG5SY";
}

</script>

</body>
</html>
