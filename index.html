<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天城娛樂城帳號申請</title>
</head>
<body>
  <h2>天城娛樂城帳號申請</h2>

  <input id="name" placeholder="姓名" /><br><br>
  <input id="phone" placeholder="電話" /><br><br>
  <input id="line" placeholder="LINE ID" /><br><br>
  <input id="line" placeholder="現居地址" /><br><br>
  <input id="line" placeholder="緊急聯絡人姓名" /><br><br>
  <input id="line" placeholder="緊急聯絡人關係" /><br><br>
  <input id="line" placeholder="緊急聯絡人電話" /><br><br>

  <button onclick="submitForm()">送出</button>

  <p id="msg" style="margin-top: 16px; color: red;"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.supabase.createClient(
      "https://trhxabsjnzgfscxvsbiy.supabase.co",
      "sb_publishable_MKnBFZ4b2OkcDtLSTZO6Ow_0IG2LllT"
    );

    async function submitForm() {
      const msg = document.getElementById("msg");
      msg.style.color = "red";
      msg.textContent = "";

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const line = document.getElementById("line").value.trim();

      if (!name || !phone || !line) {
        msg.textContent = "請先填寫姓名、電話、LINE ID、現居地址、緊急聯絡人姓名、緊急聯絡人關係、緊急聯絡人電話";
        return;
      }

      try {
        const { data, error } = await supabaseClient
          .from("credit_applications")
          .insert([
            {
              application_no: Date.now().toString(),
              full_name: name,
              phone: phone,
              line_id: line,
              national_id: "test",
              current_address: "test",
              emergency_contact: "test",
              relationship: "test",
              emergency_phone: "test",
              company_name: "test",
              company_address: "test",
              company_phone: "test",
              monthly_salary_range: "B"
            }
          ]);

        if (error) {
          console.error("Supabase error:", error);
          msg.textContent = "送出失敗：" + error.message;
          return;
        }

        console.log("Insert success:", data);
        msg.style.color = "green";
        msg.textContent = "送出成功！";

        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("line").value = "";
      } catch (err) {
        console.error("JS error:", err);
        msg.textContent = "程式錯誤：" + err.message;
      }
    }
  </script>
</body>
</html>
