<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台登入測試</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #081225;
      color: #fff;
      padding: 40px 20px;
    }
    .box {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 24px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg,#7c5cff,#00d4ff);
      font-weight: bold;
    }
    #msg {
      white-space: pre-line;
      color: #ff9f9f;
      margin-top: 10px;
      font-size: 14px;
    }
    #ok {
      color: #7effd6;
      white-space: pre-line;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Supabase 登入測試</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="密碼">
    <button onclick="login()">登入</button>
    <div id="msg"></div>
    <div id="ok"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://trhxabsjnzgfscxvsbiy.supabase.co",
      "sb_publishable_MKnBFZ4b2OkcDtLSTZO6Ow_0IG2LllT"
    );

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");
      const ok = document.getElementById("ok");

      msg.textContent = "";
      ok.textContent = "";

      if (!email || !password) {
        msg.textContent = "請輸入 Email 與密碼";
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.textContent = "登入失敗：\n" + error.message;
        console.error(error);
        return;
      }

      const { data: userData, error: userError } = await supabase.auth.getUser();

      if (userError) {
        msg.textContent = "登入成功，但讀取使用者失敗：\n" + userError.message;
        return;
      }

      const user = userData.user;

      const { data: roleData, error: roleError } = await supabase
        .from("user_roles")
        .select("*")
        .eq("user_id", user.id)
        .single();

      if (roleError) {
        msg.textContent = "登入成功，但讀取角色失敗：\n" + roleError.message;
        console.error(roleError);
        return;
      }

      ok.textContent =
        "登入成功\\n" +
        "Email: " + user.email + "\\n" +
        "角色: " + roleData.role + "\\n" +
        "代理碼: " + (roleData.agent_code || "-");
    }
  </script>
</body>
</html>
