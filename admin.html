<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天城娛樂城｜版務審核後台</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#081225;
      --card:#101a35;
      --line:rgba(255,255,255,.08);
      --text:#eef2ff;
      --muted:#aab3d1;
      --primary:#7c5cff;
      --primary2:#00d4ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,"Microsoft JhengHei",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.20), transparent 28%),
        radial-gradient(circle at top right, rgba(0,212,255,.16), transparent 24%),
        linear-gradient(180deg,#07122c 0%, #081225 100%);
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }
    .wrap{max-width:1380px;margin:0 auto}
    .card{
      background:rgba(16,26,53,.92);
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 16px 40px rgba(0,0,0,.30);
    }
    h1,h2,h3{margin-top:0}
    .small{
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }
    .hidden{display:none!important}
    input,select,textarea,button{
      font-family:inherit;
      font-size:14px;
    }
    input,select,textarea{
      width:100%;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:#192546;
      color:#fff;
      outline:none;
    }
    select option{
      color:#111;
      background:#fff;
    }
    textarea{
      min-height:82px;
      resize:vertical;
    }
    button{
      padding:11px 16px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      color:#fff;
      font-weight:800;
      background:linear-gradient(90deg,var(--primary),var(--primary2));
    }
    .btn-secondary{
      background:#39486f;
    }
    .login-grid{
      display:grid;
      grid-template-columns:1fr 1fr 120px;
      gap:12px;
      margin-top:14px;
    }
    .toolbar{
      display:grid;
      grid-template-columns:1fr 180px 180px 120px;
      gap:12px;
      margin-bottom:16px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#d7e0ff;
      font-size:12px;
    }
    .msg{
      margin-top:12px;
      color:#ffadad;
      font-size:13px;
      white-space:pre-line;
    }
    .ok{
      color:#7effd6;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:12px;
      margin-bottom:16px;
    }
    .stat{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:14px;
    }
    .stat .label{
      color:var(--muted);
      font-size:12px;
    }
    .stat .value{
      margin-top:6px;
      font-size:28px;
      font-weight:800;
    }
    .table-wrap{
      overflow:auto;
    }
    table{
      width:100%;
      border-collapse:collapse;
    }
    th,td{
      padding:12px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:left;
      vertical-align:top;
      font-size:13px;
    }
    th{
      color:var(--muted);
      font-weight:600;
    }
    .status{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      margin-bottom:10px;
    }
    .待審核{background:rgba(255,193,7,.18);color:#ffd76a}
    .已聯繫{background:rgba(0,198,255,.18);color:#7be7ff}
    .通過{background:rgba(0,229,168,.18);color:#7effd6}
    .拒絕{background:rgba(255,107,107,.18);color:#ffb3b3}
    .actions{
      display:grid;
      gap:8px;
      min-width:170px;
    }
    @media (max-width:980px){
      .login-grid,.toolbar,.stats{grid-template-columns:1fr}
      table,thead,tbody,tr,th,td{display:block}
      thead{display:none}
      tr{
        margin-bottom:14px;
        border:1px solid rgba(255,255,255,.08);
        border-radius:12px;
        padding:10px;
      }
      td{
        border-bottom:none;
      }
      td::before{
        content:attr(data-label);
        display:block;
        color:var(--muted);
        font-size:12px;
        margin-bottom:4px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="loginCard">
      <h1>版務審核後台登入</h1>
      <div class="small">僅限 admin / staff 帳號登入。管理員可查看全部資料並進行審核。</div>

      <div class="login-grid">
        <input id="email" type="email" placeholder="登入 Email">
        <input id="password" type="password" placeholder="登入密碼">
        <button onclick="login()">登入</button>
      </div>

      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="appCard" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 style="margin-bottom:6px;">後台管理中心</h2>
            <div class="small" id="userInfo">未登入</div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <span class="tag" id="roleTag">未登入</span>
            <button class="btn-secondary" onclick="logout()">登出</button>
          </div>
        </div>

        <div class="stats">
          <div class="stat"><div class="label">全部申請</div><div class="value" id="statAll">0</div></div>
          <div class="stat"><div class="label">待審核</div><div class="value" id="statPending">0</div></div>
          <div class="stat"><div class="label">已聯繫</div><div class="value" id="statContacted">0</div></div>
          <div class="stat"><div class="label">通過</div><div class="value" id="statApproved">0</div></div>
          <div class="stat"><div class="label">拒絕</div><div class="value" id="statRejected">0</div></div>
        </div>

        <div class="toolbar">
          <input id="searchKeyword" placeholder="搜尋姓名 / 電話 / LINE / 身分證字號">
          <select id="filterStatus">
            <option value="">全部狀態</option>
            <option value="待審核">待審核</option>
            <option value="已聯繫">已聯繫</option>
            <option value="通過">通過</option>
            <option value="拒絕">拒絕</option>
          </select>
          <input id="filterAgent" placeholder="代理代碼，例如 A001">
          <button onclick="loadData()">查詢</button>
        </div>

        <div id="appMsg" class="msg"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>建立時間</th>
                <th>代理</th>
                <th>會員資料</th>
                <th>職務資料</th>
                <th>狀態 / 備註</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="dataBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createClient } = supabase;

    const supabaseClient = createClient(
      "https://trhxabsjnzgfscxvsbiy.supabase.co",
      "sb_publishable_MKnBFZ4b2OkcDtLSTZO6Ow_0IG2LllT"
    );

    let currentUser = null;
    let currentRole = null;

    function setLoginMsg(text, ok = false) {
      const el = document.getElementById("loginMsg");
      el.textContent = text || "";
      el.className = ok ? "msg ok" : "msg";
    }

    function setAppMsg(text, ok = false) {
      const el = document.getElementById("appMsg");
      el.textContent = text || "";
      el.className = ok ? "msg ok" : "msg";
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      setLoginMsg("");

      if (!email || !password) {
        setLoginMsg("請輸入 Email 與密碼");
        return;
      }

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setLoginMsg("登入失敗：" + error.message);
        return;
      }

      await initApp();
    }

    async function initApp() {
      const { data: userData, error: userError } = await supabaseClient.auth.getUser();

      if (userError) {
        setLoginMsg("取得使用者失敗：" + userError.message);
        return;
      }

      currentUser = userData.user;

      if (!currentUser) {
        setLoginMsg("目前沒有登入中的使用者");
        return;
      }

      const { data: roleData, error: roleError } = await supabaseClient
        .from("user_roles")
        .select("*")
        .eq("user_id", currentUser.id)
        .single();

      if (roleError) {
        setLoginMsg("讀取角色失敗：" + roleError.message);
        return;
      }

      if (!roleData) {
        setLoginMsg("查無角色資料");
        return;
      }

      currentRole = roleData.role;

      if (!["admin", "staff"].includes(currentRole)) {
        setLoginMsg("此帳號不是版務 / 管理員帳號，請改用 agent.html");
        return;
      }

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("appCard").classList.remove("hidden");
      document.getElementById("userInfo").textContent =
        `${currentUser.email}｜角色：${currentRole}`;
      document.getElementById("roleTag").textContent = `管理者 ${currentRole}`;

      await loadData();
    }

    async function loadData() {
      setAppMsg("");

      let query = supabaseClient
        .from("credit_applications")
        .select("*")
        .order("created_at", { ascending: false });

      const status = document.getElementById("filterStatus").value;
      const filterAgent = document.getElementById("filterAgent").value.trim();
      const keyword = document.getElementById("searchKeyword").value.trim().toLowerCase();

      if (status) query = query.eq("review_status", status);
      if (filterAgent) query = query.eq("agent_code", filterAgent);

      const { data, error } = await query;

      if (error) {
        setAppMsg("讀取資料失敗：" + error.message);
        return;
      }

      let rows = data || [];

      if (keyword) {
        rows = rows.filter(row => {
          const text = [
            row.full_name || "",
            row.phone || "",
            row.line_id || "",
            row.national_id || "",
            row.agent_code || ""
          ].join(" ").toLowerCase();
          return text.includes(keyword);
        });
      }

      renderStats(rows);

      const tbody = document.getElementById("dataBody");
      tbody.innerHTML = "";

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6">目前沒有資料</td></tr>`;
        return;
      }

      rows.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="建立時間">${formatTime(row.created_at)}</td>
          <td data-label="代理">${escapeHtml(row.agent_code || "-")}</td>
          <td data-label="會員資料">
            <div><strong>${escapeHtml(row.full_name || "")}</strong></div>
            <div class="small">手機：${escapeHtml(row.phone || "")}</div>
            <div class="small">身分證：${escapeHtml(row.national_id || "")}</div>
            <div class="small">LINE：${escapeHtml(row.line_id || "")}</div>
            <div class="small">地址：${escapeHtml(row.current_address || "")}</div>
            <div class="small">緊急聯絡人：${escapeHtml(row.emergency_contact || "")}</div>
            <div class="small">關係：${escapeHtml(row.relationship || "")}</div>
            <div class="small">緊急電話：${escapeHtml(row.emergency_phone || "")}</div>
          </td>
          <td data-label="職務資料">
            <div class="small">公司：${escapeHtml(row.company_name || "")}</div>
            <div class="small">公司地址：${escapeHtml(row.company_address || "")}</div>
            <div class="small">公司電話：${escapeHtml(row.company_phone || "")}</div>
            <div class="small">薪資級距：${escapeHtml(row.monthly_salary_range || "")}</div>
            <div class="small">預估額度：${Number(row.estimated_credit || 0).toLocaleString()}</div>
          </td>
          <td data-label="狀態 / 備註">
            <div class="status ${row.review_status || "待審核"}">${escapeHtml(row.review_status || "待審核")}</div>
            <textarea id="note-${row.id}">${escapeText(row.reviewer_note || "")}</textarea>
          </td>
          <td data-label="操作">
            <div class="actions">
              <select id="status-${row.id}">
                <option value="待審核" ${(row.review_status || "待審核") === "待審核" ? "selected" : ""}>待審核</option>
                <option value="已聯繫" ${row.review_status === "已聯繫" ? "selected" : ""}>已聯繫</option>
                <option value="通過" ${row.review_status === "通過" ? "selected" : ""}>通過</option>
                <option value="拒絕" ${row.review_status === "拒絕" ? "selected" : ""}>拒絕</option>
              </select>
              <button onclick="saveRow('${row.id}')">儲存</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderStats(rows) {
      const count = (name) => rows.filter(r => (r.review_status || "待審核") === name).length;
      document.getElementById("statAll").textContent = rows.length;
      document.getElementById("statPending").textContent = count("待審核");
      document.getElementById("statContacted").textContent = count("已聯繫");
      document.getElementById("statApproved").textContent = count("通過");
      document.getElementById("statRejected").textContent = count("拒絕");
    }

    async function saveRow(id) {
      const status = document.getElementById(`status-${id}`).value;
      const note = document.getElementById(`note-${id}`).value.trim();

      const { error } = await supabaseClient
        .from("credit_applications")
        .update({
          review_status: status,
          reviewer_note: note,
          reviewer_user_id: currentUser.id
        })
        .eq("id", id);

      if (error) {
        setAppMsg("更新失敗：" + error.message);
        return;
      }

      setAppMsg("已更新", true);
      await loadData();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      location.reload();
    }

    function formatTime(v) {
      if (!v) return "-";
      try {
        return new Date(v).toLocaleString("zh-TW");
      } catch {
        return v;
      }
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeText(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    initApp();
  </script>
</body>
</html>
