<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>版務審核後台</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0b1220,#0d1e3a);
  color:#fff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  backdrop-filter: blur(10px);
}

input,button,select {
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

input {
  width:100%;
  margin-bottom:10px;
}

button {
  cursor:pointer;
  background: linear-gradient(90deg,#7c5cff,#00d4ff);
  color:#fff;
}

.table {
  width:100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.badge {
  padding:4px 10px;
  border-radius:6px;
}

.pending { background:#ffaa00; }
.approved { background:#00c853; }
.rejected { background:#ff5252; }

.hidden { display:none; }
.msg { color:#ff6b6b; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

  <!-- 登入 -->
  <div class="card" id="loginCard">
    <h2>版務後台登入</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="密碼">
    <button onclick="login()">登入</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- 後台 -->
  <div id="adminApp" class="hidden">

    <div class="card">
      <div id="userInfo"></div>
      <button onclick="logout()">登出</button>
    </div>

    <div class="card">
      <h3>會員申請資料</h3>
      <table class="table">
        <thead>
          <tr>
            <th>姓名</th>
            <th>電話</th>
            <th>LINE</th>
            <th>代理</th>
            <th>額度</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="dataBody"></tbody>
      </table>
    </div>

  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://trhxabsjzngfscxvbsiy.supabase.co",
  "sb_publishable_MKnBFZ4b2OkcDtLSTZO6Ow_0IG2LllT"
);

let currentUser = null;
let currentRole = null;
let agentCode = null;

/* 登入 */
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("loginMsg");
  msg.textContent = "";

  if (!email || !password) {
    msg.textContent = "請輸入帳號密碼";
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    msg.textContent = error.message;
    return;
  }

  await initApp();
}

/* 初始化 */
async function initApp() {

  const { data: userData } = await supabase.auth.getUser();
  currentUser = userData.user;

  if (!currentUser) return;

  const { data: roleData, error } = await supabase
    .from("user_roles")
    .select("*")
    .eq("user_id", currentUser.id)
    .single();

  if (error || !roleData) {
    alert("沒有權限");
    return;
  }

  currentRole = roleData.role;
  agentCode = roleData.agent_code;

  document.getElementById("loginCard").classList.add("hidden");
  document.getElementById("adminApp").classList.remove("hidden");

  document.getElementById("userInfo").textContent =
    `${currentUser.email}（${currentRole}）`;

  loadData();
}

/* 載入資料 */
async function loadData() {

  let query = supabase.from("credit_applications").select("*");

  if (currentRole === "agent") {
    query = query.eq("agent_code", agentCode);
  }

  const { data } = await query.order("created_at", { ascending: false });

  const tbody = document.getElementById("dataBody");
  tbody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.full_name}</td>
      <td>${row.phone}</td>
      <td>${row.line_id}</td>
      <td>${row.agent_code || "-"}</td>
      <td>${row.estimated_credit || "-"}</td>
      <td><span class="badge ${row.review_status}">
        ${row.review_status}
      </span></td>
      <td>
        ${currentRole !== "agent" ? `
        <button onclick="updateStatus('${row.id}','approved')">核准</button>
        <button onclick="updateStatus('${row.id}','rejected')">拒絕</button>
        ` : "-"}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

/* 更新狀態 */
async function updateStatus(id, status) {
  await supabase
    .from("credit_applications")
    .update({ review_status: status })
    .eq("id", id);

  loadData();
}

/* 登出 */
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

/* 自動登入 */
initApp();
</script>

</body>
</html>
