<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>版務審核後台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      margin:0;
      font-family:Arial,"Microsoft JhengHei",sans-serif;
      background:#0b1020;
      color:#eef2ff;
      padding:24px;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
    }
    .card{
      background:#121a33;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    h1,h2{margin-top:0}
    .small{
      font-size:12px;
      color:#aab3d1;
      line-height:1.7;
    }
    .hidden{display:none}
    input,select,textarea,button{
      font-family:inherit;
      font-size:14px;
    }
    input,select,textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.12);
      background:#0f1730;
      color:#fff;
      box-sizing:border-box;
    }
    textarea{
      resize:vertical;
      min-height:80px;
    }
    select option{
      color:#000;
      background:#fff;
    }
    button{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      color:#fff;
      font-weight:700;
      background:linear-gradient(90deg,#6c63ff,#00c6ff);
    }
    .btn-secondary{
      background:#2a355e;
    }
    .login-grid{
      display:grid;
      grid-template-columns:1fr 1fr 120px;
      gap:12px;
      margin-top:14px;
    }
    .toolbar{
      display:grid;
      grid-template-columns:1fr 180px 180px 120px;
      gap:12px;
      margin-bottom:16px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#aab3d1;
      font-size:12px;
    }
    table{
      width:100%;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:left;
      vertical-align:top;
      padding:12px 10px;
      font-size:13px;
    }
    th{
      color:#aab3d1;
      font-weight:600;
      background:#121a33;
    }
    .status{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      margin-bottom:8px;
    }
    .待審核{background:rgba(255,193,7,.18);color:#ffd76a}
    .已聯繫{background:rgba(0,198,255,.18);color:#7be7ff}
    .通過{background:rgba(0,229,168,.18);color:#7effd6}
    .拒絕{background:rgba(255,107,107,.18);color:#ffb3b3}
    .actions{
      display:grid;
      gap:8px;
      min-width:170px;
    }
    .msg{
      margin-top:12px;
      color:#ffb3b3;
      font-size:13px;
    }
    @media (max-width: 980px){
      .login-grid,.toolbar{grid-template-columns:1fr}
      table,thead,tbody,th,td,tr{display:block}
      thead{display:none}
      tr{
        border:1px solid rgba(255,255,255,.08);
        border-radius:14px;
        padding:10px;
        margin-bottom:14px;
        background:#0f1730;
      }
      td{
        border-bottom:none;
        padding:8px 0;
      }
      td::before{
        content:attr(data-label);
        display:block;
        color:#aab3d1;
        font-size:12px;
        margin-bottom:4px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="loginCard">
      <h1>版務審核後台登入</h1>
      <div class="small">僅限 admin / staff 使用。</div>
      <div class="login-grid">
        <input id="email" type="email" placeholder="登入 Email">
        <input id="password" type="password" placeholder="登入密碼">
        <button onclick="login()">登入</button>
      </div>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="adminApp" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 style="margin-bottom:6px;">信用申請審核後台</h2>
            <div class="small" id="userInfo">未登入</div>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <span class="tag">admin / staff 可看全部</span>
            <button class="btn-secondary" onclick="logout()">登出</button>
          </div>
        </div>

        <div class="toolbar">
          <input id="searchKeyword" placeholder="搜尋姓名 / 電話 / LINE ID">
          <select id="filterStatus">
            <option value="">全部狀態</option>
            <option value="待審核">待審核</option>
            <option value="已聯繫">已聯繫</option>
            <option value="通過">通過</option>
            <option value="拒絕">拒絕</option>
          </select>
          <input id="filterAgent" placeholder="代理代碼，例如 A001">
          <button onclick="loadData()">查詢</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>建立時間</th>
              <th>代理</th>
              <th>會員資料</th>
              <th>職務資料</th>
              <th>狀態 / 備註</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://trhxabsjnzgfscxvsbiy.supabase.co",
      "sb_publishable_MKnBFZ4b2OkcDtLSTZO6Ow_0IG2LllT"
    );

    let currentUser = null;

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("loginMsg");
      msg.textContent = "";

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = "登入失敗：" + error.message;
        return;
      }

      await initApp();
    }

    async function logout() {
      await supabase.auth.signOut();
      document.getElementById("adminApp").classList.add("hidden");
      document.getElementById("loginCard").classList.remove("hidden");
      document.getElementById("loginMsg").textContent = "";
    }

    async function initApp() {
      const { data: authData } = await supabase.auth.getUser();
      currentUser = authData.user;

      if (!currentUser) return;

      const { data: roleRow, error: roleError } = await supabase
        .from("user_roles")
        .select("*")
        .eq("user_id", currentUser.id)
        .single();

      if (roleError || !roleRow || !["staff", "admin"].includes(roleRow.role)) {
        alert("你沒有版務後台權限");
        await supabase.auth.signOut();
        return;
      }

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("adminApp").classList.remove("hidden");
      document.getElementById("userInfo").textContent =
        `目前登入：${roleRow.display_name || currentUser.email}｜角色：${roleRow.role}`;

      await loadData();
    }

    async function loadData() {
      let query = supabase
        .from("credit_applications")
        .select("*")
        .order("created_at", { ascending: false });

      const status = document.getElementById("filterStatus").value;
      const agent = document.getElementById("filterAgent").value.trim();
      const keyword = document.getElementById("searchKeyword").value.trim().toLowerCase();

      if (status) query = query.eq("review_status", status);
      if (agent) query = query.eq("agent_code", agent);

      const { data, error } = await query;

      if (error) {
        alert("讀取資料失敗：" + error.message);
        return;
      }

      let rows = data || [];

      if (keyword) {
        rows = rows.filter(row => {
          const s = [
            row.full_name || "",
            row.phone || "",
            row.line_id || "",
            row.company_name || "",
            row.agent_code || ""
          ].join(" ").toLowerCase();
          return s.includes(keyword);
        });
      }

      const tbody = document.getElementById("tbody");

      tbody.innerHTML = rows.map(row => `
        <tr>
          <td data-label="建立時間">${formatTime(row.created_at)}</td>
          <td data-label="代理">${escapeHtml(row.agent_code || "-")}</td>
          <td data-label="會員資料">
            <div><strong>${escapeHtml(row.full_name || "")}</strong></div>
            <div class="small">電話：${escapeHtml(row.phone || "")}</div>
            <div class="small">LINE：${escapeHtml(row.line_id || "")}</div>
            <div class="small">地址：${escapeHtml(row.current_address || "")}</div>
            <div class="small">緊急聯絡人：${escapeHtml(row.emergency_contact || "")}</div>
            <div class="small">關係：${escapeHtml(row.relationship || "")}</div>
            <div class="small">緊急電話：${escapeHtml(row.emergency_phone || "")}</div>
          </td>
          <td data-label="職務資料">
            <div class="small">公司：${escapeHtml(row.company_name || "")}</div>
            <div class="small">公司地址：${escapeHtml(row.company_address || "")}</div>
            <div class="small">公司電話：${escapeHtml(row.company_phone || "")}</div>
            <div class="small">薪資級距：${escapeHtml(row.monthly_salary_range || "")}</div>
          </td>
          <td data-label="狀態 / 備註">
            <div class="status ${(row.review_status || "待審核")}">${escapeHtml(row.review_status || "待審核")}</div>
            <textarea id="note-${row.id}" placeholder="版務備註">${escapeTextarea(row.reviewer_note || "")}</textarea>
          </td>
          <td data-label="操作">
            <div class="actions">
              <select id="status-${row.id}">
                <option value="待審核" ${(row.review_status || "待審核") === "待審核" ? "selected" : ""}>待審核</option>
                <option value="已聯繫" ${row.review_status === "已聯繫" ? "selected" : ""}>已聯繫</option>
                <option value="通過" ${row.review_status === "通過" ? "selected" : ""}>通過</option>
                <option value="拒絕" ${row.review_status === "拒絕" ? "selected" : ""}>拒絕</option>
              </select>
              <button onclick="saveRow(${row.id})">儲存</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function saveRow(id) {
      const status = document.getElementById(`status-${id}`).value;
      const note = document.getElementById(`note-${id}`).value.trim();

      const { error } = await supabase
        .from("credit_applications")
        .update({
          review_status: status,
          reviewer_note: note,
          reviewer_user_id: currentUser.id
        })
        .eq("id", id);

      if (error) {
        alert("更新失敗：" + error.message);
        return;
      }

      alert("已更新");
      await loadData();
    }

    function formatTime(v) {
      if (!v) return "-";
      try {
        return new Date(v).toLocaleString("zh-TW");
      } catch {
        return v;
      }
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeTextarea(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    initApp();
  </script>
</body>
</html>
